    type Post {
        id: ID!
        title: String!
        content: String
        published: Boolean!
        author: User
    }

    type User {
        email: String!
        id: ID!
        name: String
        posts: [Post!]
    }

    type Query {
        posts: [Post]
        post(id: ID!): Post
    }

    type Mutation {
        createUser(data: UserCreateInput!): User!
        createDraft(data: PostCreateInput): Post
        publishPost(id: ID!): Post
    }

    input UserCreateInput {
        email: String!
        name: String!
        posts: [createPostWithoutAuthorInput!]
    }

    input PostCreateInput {
        authorId: Int
        content: String
        title: String!
    }

    input createPostWithoutAuthorInput {
        content: String
        published: Boolean
        title: String!
    }