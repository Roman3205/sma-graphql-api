    enum CacheControlScope {
        PUBLIC
        PRIVATE
    }

    directive @cacheControl(
        maxAge: Int
        scope: CacheControlScope
        inheritMaxAge: Boolean
    ) on FIELD_DEFINITION | OBJECT | INTERFACE | UNION

    type Post {
        id: ID!
        title: String!
        content: String
        published: Boolean!
        createdAt: String!
        author: User
        comments: [Comment!]!
        categories: [Category!]!
    }

    type User {
        email: String!
        id: ID!
        name: String
        createdAt: String!
        posts: [Post!]
        comments: [Comment!]
        articles: [Article!]
    }

    type Comment {
        id: ID!
        body: String!
        createdAt: String!
        author: User!
        post: Post!
    }

    type Article {
        id: ID!
        title: String!
        content: String
        createdAt: String!
        author: User!
        tags: [Tag!]!
    }

    type Tag @cacheControl(maxAge: 300, scope: PUBLIC) {
        id: ID!
        name: String!
        articles: [Article!]!
    }

    type Category @cacheControl(maxAge: 300, scope: PUBLIC) {
        id: ID!
        name: String!
        posts: [Post!]!
    }

    type AuthPayload {
        token: String!
        user: User!
    }

    union SearchResult = Post | Article | Comment

    type PageInfo {
        hasNextPage: Boolean!
        hasPreviousPage: Boolean!
        startCursor: String
        endCursor: String
    }

    type PostEdge {
        cursor: String!
        node: Post!
    }

    type PostConnection {
        edges: [PostEdge!]!
        pageInfo: PageInfo!
        totalCount: Int!
    }

    type UserDashboard {
        user: User!
        totalPosts: Int!
        totalComments: Int!
        totalArticles: Int!
        publishedPosts: Int!
        recentPosts: [Post!]!
        recentComments: [Comment!]!
        recentArticles: [Article!]!
        mostCommentedPost: Post
    }

    type Query {
        """
        Retrieve a paginated list of posts with cursor-based pagination.
        """
        posts(first: Int, after: String, last: Int, before: String): PostConnection!

        """
        Retrieve a single post by its ID.
        """
        post(id: ID!): Post

        """
        Retrieve the currently authenticated user's profile.
        """
        me: User!

        """
        Retrieve a comment by post ID and comment ID.
        """
        comment(postId: ID!, id: ID!): Comment

        """
        Retrieve all comments associated with a specific post.
        """
        commentsByPost(postId: ID!): [Comment!]!

        """
        Retrieve all articles authored by the currently authenticated user.
        """
        articles: [Article!]!

        """
        Retrieve a single article by its ID, authored by the currently authenticated user.
        """
        article(id: ID!): Article

        """
        Retrieve all available tags (cached).
        """
        tags: [Tag!]! @cacheControl(maxAge: 300, scope: PUBLIC)

        """
        Retrieve all available post categories (cached).
        """
        categories: [Category!]! @cacheControl(maxAge: 300, scope: PUBLIC)

        """
        Search for posts, articles, and comments by text query.
        """
        search(text: String!): [SearchResult!]!

        """
        Retrieve user activity statistics and summaries for the dashboard.
        """
        userDashboard: UserDashboard!
    }

    type Mutation {
        """
        Register a new user and generate an authentication token.
        """
        signup(data: SignupInput!): AuthPayload!

        """
        Log in an existing user and generate an authentication token.
        """
        login(data: LoginInput!): AuthPayload!

        """
        Create a new draft post for the authenticated user.
        """
        createDraft(data: PostCreateInput!): Post!

        """
        Publish a draft post owned by the authenticated user.
        """
        publishPost(id: ID!): Post!

        """
        Delete a post owned by the authenticated user.
        """
        deletePost(id: ID!): Post

        """
        Create a new comment on a post.
        """
        createComment(data: CommentCreateInput!): Comment!

        """
        Create a new article with optional tags for the authenticated user.
        """
        createArticle(data: ArticleCreateInput!): Article!

        """
        Associate a category with a post.
        """
        addCategoryToPost(postId: ID!, categoryId: ID!): Post!
    }

    type Subscription {
        """
        Triggered when a new draft post is created.
        """
        postCreated: Post!
    }

    input SignupInput {
        email: String!
        name: String!
        password: String!
    }

    input LoginInput {
        email: String!
        password: String!
    }

    input PostCreateInput {
        content: String
        title: String!
    }

    input CommentCreateInput {
        body: String!
        postId: Int!
    }

    input ArticleCreateInput {
        title: String!
        content: String
        tagIds: [Int!]
    }